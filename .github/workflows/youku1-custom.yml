name: 优酷路由宝-定制Tailscale+Zerotier+EasyTier+Frpc

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: lmq8267/padavan-KVR
    - name: Move source
      run: |
        sudo mkdir -p /opt/rt-n56u
        sudo cp -a $GITHUB_WORKSPACE/. /opt/rt-n56u/
    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget
    - name: Toolchain
      run: |
        cd /opt/rt-n56u/toolchain-mipsel && sh dl_toolchain.sh && mkdir -p /opt/images/
    - name: Partition
      run: |
        sed -i s/SIZ=0x80000/SIZ=0x1500000/g /opt/rt-n56u/trunk/configs/boards/YK-L1/kernel-3.4.x.config
        sed -i s/size_etc=6M/size_etc=21M/g /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i s/size_tmp=24M/size_tmp=30M/g /opt/rt-n56u/trunk/user/scripts/dev_init.sh
        sed -i s/mtd_part_size=65536/mtd_part_size=22020096/g /opt/rt-n56u/trunk/user/scripts/mtd_storage.sh
    - name: Build firmware
      env:
        TNAME: YK-L1
      run: |
        cd /opt/rt-n56u/trunk
        cp configs/templates/$TNAME.config .config
        for opt in \
          CONFIG_FIRMWARE_ENABLE_IPV6 CONFIG_FIRMWARE_ENABLE_USB \
          CONFIG_FIRMWARE_ENABLE_EXT4 CONFIG_FIRMWARE_ENABLE_FUSE \
          CONFIG_FIRMWARE_ENABLE_SWAP CONFIG_FIRMWARE_INCLUDE_IPSET \
          CONFIG_FIRMWARE_INCLUDE_SMBD CONFIG_FIRMWARE_INCLUDE_SMBD36 \
          CONFIG_FIRMWARE_INCLUDE_FTPD CONFIG_FIRMWARE_INCLUDE_DROPBEAR \
          CONFIG_FIRMWARE_INCLUDE_OPENSSH CONFIG_FIRMWARE_INCLUDE_OPENVPN \
          CONFIG_FIRMWARE_INCLUDE_HTTPS CONFIG_FIRMWARE_INCLUDE_CURL \
          CONFIG_FIRMWARE_INCLUDE_TTYD CONFIG_FIRMWARE_INCLUDE_HTOP \
          CONFIG_FIRMWARE_INCLUDE_IPERF3 CONFIG_FIRMWARE_INCLUDE_SOCAT \
          CONFIG_FIRMWARE_INCLUDE_NAPT66 CONFIG_FIRMWARE_INCLUDE_VLMCSD \
          CONFIG_FIRMWARE_INCLUDE_FRPC CONFIG_FIRMWARE_INCLUDE_FRPS \
          CONFIG_FIRMWARE_INCLUDE_TAILSCALE CONFIG_FIRMWARE_INCLUDE_ZEROTIER \
          CONFIG_FIRMWARE_INCLUDE_EASYTIER \
          CONFIG_FIRMWARE_INCLUDE_MINIDLNA CONFIG_FIRMWARE_INCLUDE_XUPNPD \
          CONFIG_FIRMWARE_INCLUDE_FIREFLY CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW; \
        do sed -i /$opt/d .config; done
        echo CONFIG_FIRMWARE_ENABLE_IPV6=y >> .config
        echo CONFIG_FIRMWARE_ENABLE_USB=y >> .config
        echo CONFIG_FIRMWARE_ENABLE_EXT4=y >> .config
        echo CONFIG_FIRMWARE_ENABLE_FUSE=y >> .config
        echo CONFIG_FIRMWARE_ENABLE_SWAP=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_IPSET=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_SMBD=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_SMBD36=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_FTPD=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_DROPBEAR=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_OPENSSH=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_OPENVPN=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_HTTPS=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_CURL=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_TTYD=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_HTOP=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_IPERF3=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_SOCAT=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_NAPT66=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_VLMCSD=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_MINIDLNA=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_XUPNPD=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_FIREFLY=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_FFMPEG_NEW=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_FRPC=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_FRPS=n >> .config
        echo CONFIG_FIRMWARE_INCLUDE_TAILSCALE=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_ZEROTIER=y >> .config
        echo CONFIG_FIRMWARE_INCLUDE_EASYTIER=y >> .config
        sudo ./clear_tree
        sudo ./build_firmware_modify $TNAME 0
        sudo mv images/*.trx /opt/images/
        cp .config /opt/images/$TNAME.config
        echo tag=$(date +%Y-%m-%d) >> $GITHUB_ENV
    - name: Patch uImage name (fix router upgrade check)
      run: |
        cd /opt/images
        TRX_FILE=$(ls *.trx | head -1)
        echo "Patching $TRX_FILE ..."
        python3 << 'PEOF'
import struct, zlib, glob, os

# Find the .trx file
trx_files = glob.glob('/opt/images/*.trx')
if not trx_files:
    print("ERROR: No .trx file found!")
    exit(1)

trx_file = trx_files[0]
print(f"Processing: {trx_file}")

with open(trx_file, 'rb') as f:
    data = bytearray(f.read())

# Verify uImage magic
magic = struct.unpack('>I', data[0:4])[0]
if magic != 0x27051956:
    print(f"ERROR: Not a valid uImage (magic=0x{magic:08x})")
    exit(1)

# Read current name field (bytes 32-63)
old_name = data[32:64]
print(f"Old image name: {old_name[4:].rstrip(b'\x00').decode('ascii', errors='replace')}")

# Build new name: version prefix + "RT-N14U-GPIO-1-youku1-1" + null padding
prefix = old_name[:4]
new_model = b'RT-N14U-GPIO-1-youku1-1'
new_name = prefix + new_model + b'\x00' * (32 - 4 - len(new_model))

# Write new name
data[32:64] = new_name
print(f"New image name: {new_name[4:].rstrip(b'\x00').decode('ascii')}")

# Recalculate header CRC (bytes 0-63, CRC field zeroed)
data[4:8] = b'\x00\x00\x00\x00'
new_crc = zlib.crc32(bytes(data[:64])) & 0xFFFFFFFF
data[4:8] = struct.pack('>I', new_crc)

print(f"New header CRC: 0x{new_crc:08x}")

# Save
with open(trx_file, 'wb') as f:
    f.write(data)

# Verify
with open(trx_file, 'rb') as f:
    verify = f.read()
verify_name = verify[32:64][4:].rstrip(b'\x00').decode('ascii', errors='replace')
print(f"Verified name: {verify_name}")
print("Patch complete!")
PEOF
    - name: Upload
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: youku1-tailscale-zerotier-easytier-frpc
        path: /opt/images
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: youku1-custom-${{ env.tag }}
        files: /opt/images/*


